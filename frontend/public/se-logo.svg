<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Gold ring -->
  <circle cx="32" cy="32" r="31" fill="url(#goldRing)" />
  <!-- Dark inner circle -->
  <circle cx="32" cy="32" r="27" fill="#2a2d4a" />
  <!-- SE text -->
  <text x="32" y="39" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="22" fill="url(#goldText)">SE</text>
  <defs>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" />
      <stop offset="30%" stop-color="#f5e27a" />
      <stop offset="60%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#8b6914" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e27a" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#8b6914" />
    </linearGradient>
  </defs>
